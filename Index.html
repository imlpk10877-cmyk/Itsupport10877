<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Support - รพ.หลวงพ่อคูณ ปริสุทโธ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-4xl mx-auto p-4">
    <div class="bg-blue-800 text-white rounded-t-lg p-6 text-center shadow-md">
      <h1 class="text-2xl font-semibold">ระบบแจ้งปัญหา IT</h1>
      <p class="text-blue-200">โรงพยาบาลหลวงพ่อคูณ ปริสุทโธ</p>
    </div>

    <div class="flex bg-white shadow-md rounded-b-lg mb-6 overflow-hidden">
      <button onclick="showTab('formTab')" id="btn-formTab" class="flex-1 py-3 text-center font-medium bg-blue-50 text-blue-700 border-b-2 border-blue-600 transition">แจ้งปัญหา</button>
      <button onclick="showTab('dashTab')" id="btn-dashTab" class="flex-1 py-3 text-center font-medium text-gray-500 hover:bg-gray-50 transition">ประวัติ / ติดตามสถานะ</button>
    </div>

    <!-- ฟอร์มแจ้งซ่อม -->
    <div id="formTab" class="bg-white p-6 rounded-lg shadow-md mb-6 relative">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="absolute inset-0 bg-white bg-opacity-80 flex justify-center items-center z-10">
        <p class="text-blue-600 font-semibold animate-pulse">กำลังโหลดข้อมูล...</p>
      </div>

      <h2 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">ฟอร์มแจ้งปัญหา</h2>
      <form id="issueForm" onsubmit="handleFormSubmit(event)">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">ชื่อผู้ส่งซ่อม</label>
            <input list="nameList" id="name" placeholder="-- พิมพ์ค้นหา หรือ เลือกชื่อ --" autocomplete="off" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <datalist id="nameList"></datalist>
          </div>
          <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">หน่วยงาน</label>
            <input list="deptList" id="dept" placeholder="-- พิมพ์ค้นหา หรือ เลือกแผนก --" autocomplete="off" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <datalist id="deptList"></datalist>
          </div>
          <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">กลุ่มงาน</label>
            <input list="groupList" id="group" placeholder="-- พิมพ์ค้นหา หรือ เลือกกลุ่มงาน --" autocomplete="off" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <datalist id="groupList"></datalist>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">ระบบที่พบปัญหา</label>
          <select id="system" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- เลือกระบบ --</option>
            <option value="HOSxP">HOSxP</option>
            <option value="IPD Paperless">IPD Paperless</option>
            <option value="Hardware (คอมฯ/ปริ้นเตอร์)">Hardware (คอมฯ/ปริ้นเตอร์)</option>
            <option value="Network/Internet">Network / Internet</option>
            <option value="อื่นๆ">ขอรายงาน</option>
             <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">รายละเอียดปัญหา (อาการ)</label>
          <textarea id="issue" rows="3" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-bold mb-2">แนบรูปภาพ (ถ้ามี)</label>
          <input type="file" id="imageFile" accept="image/*" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md">
          ส่งข้อมูลแจ้งปัญหา
        </button>
      </form>
    </div>

    <!-- แดชบอร์ด -->
    <div id="dashTab" class="hidden bg-white p-6 rounded-lg shadow-md mb-6">
      <div class="flex justify-between items-center mb-4 border-b pb-2">
        <h2 class="text-xl font-semibold text-gray-700">ประวัติและการติดตามสถานะ</h2>
        <button onclick="loadDashboard()" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-gray-700 transition">รีเฟรชข้อมูล</button>
      </div>
      
      <div class="mb-4">
        <input type="text" id="searchInput" onkeyup="filterHistory()" placeholder="🔍 ค้นหาชื่อ, แผนก, หรือระบบที่แจ้งปัญหา..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 text-gray-600 text-sm">
              <th class="p-3 border-b">Ticket ID</th>
              <th class="p-3 border-b">ระบบ</th>
              <th class="p-3 border-b w-1/3">ปัญหาที่พบ</th>
              <th class="p-3 border-b">ผู้แจ้ง</th>
              <th class="p-3 border-b">สถานะ</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm">
            <tr><td colspan="5" class="p-4 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ ใส่ URL ของ Web App จาก Google Apps Script ที่นี่
    const GAS_URL = "https://script.google.com/macros/s/ใส่_Deployment_ID_ของคุณ/exec";

    window.onload = function() {
      // โหลดข้อมูลใส่ Datalist
      fetch(GAS_URL + "?action=getConfigData")
        .then(res => res.json())
        .then(config => {
          populateDatalist('nameList', config.names);
          populateDatalist('deptList', config.depts);
          populateDatalist('groupList', config.groups);
          document.getElementById('loadingOverlay').classList.add('hidden'); 
        })
        .catch(err => console.error("Error loading config:", err));

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('tab') === 'dashTab') { showTab('dashTab'); } 
      else { showTab('formTab'); }
    };

    function populateDatalist(elementId, items) {
      const datalist = document.getElementById(elementId);
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        datalist.appendChild(option);
      });
    }

    function showTab(tabId) {
      document.getElementById('formTab').classList.add('hidden');
      document.getElementById('dashTab').classList.add('hidden');
      document.getElementById(tabId).classList.remove('hidden');
      document.getElementById('btn-formTab').className = "flex-1 py-3 text-center font-medium text-gray-500 hover:bg-gray-50 transition";
      document.getElementById('btn-dashTab').className = "flex-1 py-3 text-center font-medium text-gray-500 hover:bg-gray-50 transition";
      document.getElementById('btn-' + tabId).className = "flex-1 py-3 text-center font-medium bg-blue-50 text-blue-700 border-b-2 border-blue-600 transition";
      if(tabId === 'dashTab') loadDashboard();
    }

    function filterHistory() {
      const filter = document.getElementById("searchInput").value.toLowerCase();
      const tr = document.getElementById("tableBody").getElementsByTagName("tr");
      for (let i = 0; i < tr.length; i++) {
        if (tr[i].cells.length < 5) continue; 
        tr[i].style.display = tr[i].innerText.toLowerCase().indexOf(filter) > -1 ? "" : "none";
      }
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = 'กำลังส่งข้อมูล...';
      btn.disabled = true;

      const data = {
        name: document.getElementById('name').value,
        dept: document.getElementById('dept').value,
        group: document.getElementById('group').value,
        system: document.getElementById('system').value,
        issue: document.getElementById('issue').value,
        image: null
      };

      const fileInput = document.getElementById('imageFile');
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          data.image = { filename: file.name, mimeType: file.type, base64: e.target.result.split(',')[1] };
          sendToGoogle(data, btn);
        };
        reader.readAsDataURL(file);
      } else {
        sendToGoogle(data, btn);
      }
    }

    function sendToGoogle(data, btn) {
      fetch(GAS_URL + "?action=submitIssue", {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(result => {
        alert('แจ้งปัญหาสำเร็จ! หมายเลขติดตามคือ: ' + result.ticketId);
        document.getElementById('issueForm').reset();
        btn.innerText = 'ส่งข้อมูลแจ้งปัญหา';
        btn.disabled = false;
        showTab('dashTab');
      })
      .catch(err => {
        alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
        btn.disabled = false;
        btn.innerText = 'ส่งข้อมูลแจ้งปัญหา';
      });
    }

    function loadDashboard() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>';
      
      fetch(GAS_URL + "?action=getIssues")
        .then(res => res.json())
        .then(data => {
          tbody.innerHTML = '';
          if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">ยังไม่มีข้อมูลแจ้งปัญหา</td></tr>';
            return;
          }
          data.forEach(item => {
            let statusClass = item.status === 'รอดำเนินการ' ? "bg-red-100 text-red-700" : (item.status === 'กำลังแก้ไข' ? "bg-yellow-100 text-yellow-700" : "bg-green-100 text-green-700");
            const imageLink = item.imageUrl ? `<a href="${item.imageUrl}" target="_blank" class="text-xs text-blue-600 underline mt-1 inline-block">🖼️ ดูรูปภาพแนบ</a>` : '';
            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-gray-50";
            tr.innerHTML = `
              <td class="p-3 whitespace-nowrap"><span class="text-xs text-gray-400 block">${item.timestamp.substring(0,16)}</span>${item.ticketId}</td>
              <td class="p-3 font-medium text-blue-800">${item.system}</td>
              <td class="p-3">${item.issue}<br>${imageLink}<br>
                <span class="text-xs text-blue-600 block mt-1">IT รับผิดชอบ: ${item.itName}</span>
                <span class="text-xs text-gray-500">หมายเหตุ: ${item.remark || '-'}</span>
              </td>
              <td class="p-3">${item.name}<br><span class="text-xs text-gray-500">${item.dept} (${item.group})</span></td>
              <td class="p-3"><span class="px-2 py-1 rounded text-xs font-semibold ${statusClass}">${item.status}</span></td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(err => {
          tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-red-500">ไม่สามารถโหลดข้อมูลได้</td></tr>';
          console.error(err);
        });
    }
  </script>
</body>
</html>
